# fly.toml app configuration file generated for streamweaver-new on 2026-03-26T23:48:48-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'streamweaver-new'
primary_region = 'iad'

[build]

[env]
  PERSIST_ROOT = '/data/runtime'

[[mounts]]
  source = 'streamweaver_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[services]]
  internal_port = 8090
  protocol = 'tcp'
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 8080
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 8443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
