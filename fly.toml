app = 'streamweaver-new'
primary_region = 'iad'

[build]
  [build.args]
    NEXT_PUBLIC_TWITCH_CLIENT_ID = '9u0mtc83xeabmguw53c89dehth0gwg'
    NEXT_PUBLIC_STREAMWEAVE_URL = 'https://streamweaver-new.fly.dev'
    NEXT_PUBLIC_BASE_URL = 'https://streamweaver-new.fly.dev'

[env]
  PERSIST_ROOT = '/data/runtime'

[[mounts]]
  source = 'streamweaver_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  internal_port = 8090
  protocol = 'tcp'

  [[services.ports]]
    port = 8090
    handlers = ['tls', 'http']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
